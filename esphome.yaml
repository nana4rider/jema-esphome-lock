esphome:
  name: frontdoor
  friendly_name: frontdoor

rp2040:
  board: rpipicow

logger:

api:
  encryption:
    key: !secret frontdoor__encryption_key

ota:
  - platform: esphome
    password: !secret frontdoor__ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

captive_portal:

web_server:
  port: 80
  version: 3

switch:
- platform: gpio
  id: jema_control
  internal: true
  pin: 20
  restore_mode: ALWAYS_OFF
  on_turn_on:
    - delay: 250ms
    - switch.turn_off: jema_control

binary_sensor:
  - platform: gpio
    id: jema_monitor
    internal: true
    pin:
      number: 21
      mode: INPUT_PULLUP
      inverted: true
    filters:
      - delayed_on: 20ms
      - delayed_off: 20ms

lock:
  - platform: template
    id: door_lock
    name: 玄関ドア
    lambda: |-
      if (id(jema_monitor).state) {
        return LOCK_STATE_LOCKED;
      } else {
        return LOCK_STATE_UNLOCKED;
      }
    lock_action:
      - switch.turn_on: jema_control
    unlock_action:
      - switch.turn_on: jema_control
